name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run unit tests (pure logic)
        run: uv run pytest -v -m unit

      - name: Run sociable service tests
        run: uv run pytest -v -m service

      - name: Run contract tests
        # Payment gateway contract tests require Docker (available on ubuntu-latest).
        run: uv run pytest -v -m contract

      - name: Run E2E tests
        # E2E tests also use the Docker payment provider fixture.
        run: uv run pytest -v -m e2e

      - name: Run anti-pattern tests
        run: uv run pytest -v -m antipattern
